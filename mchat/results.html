<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>M-CHAT-R Nəticələr — AN Mərkəzi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bordo:#7B1F2E;--bordo2:#9E2D40;--gold:#C9973B;
  --cream:#FAF7F2;--ink:#1A1118;--muted:#6B6070;
  --card:#fff;--border:#E8E2DA;--green:#2E7D52;
  --red:#C0392B;--orange:#E67E22;--r:12px;
  --shadow:0 2px 16px rgba(0,0,0,.07);
}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);
  min-height:100vh;overflow-x:hidden;width:100%}

.top-nav{background:rgba(250,247,242,.97);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:0 1rem;
  display:flex;align-items:center;justify-content:space-between;
  height:58px;position:sticky;top:0;z-index:100;width:100%}
.nav-brand{display:flex;align-items:center;gap:.5rem;
  font-family:'Playfair Display',serif;font-size:.9rem;
  color:var(--bordo);font-weight:700;text-decoration:none}
.nav-brand img{width:32px;height:32px;border-radius:8px}
.nav-right{display:flex;gap:.4rem;flex-wrap:wrap}
.btn-nav{padding:.33rem .75rem;border-radius:50px;border:1.5px solid var(--border);
  background:transparent;font-size:.74rem;color:var(--muted);cursor:pointer;
  transition:all .2s;text-decoration:none;display:flex;align-items:center;gap:.3rem;
  white-space:nowrap}
.btn-nav:hover{border-color:var(--bordo);color:var(--bordo)}
.btn-nav.primary{background:var(--bordo);color:#fff;border-color:var(--bordo)}
.btn-nav.primary:hover{background:var(--bordo2)}
.btn-nav.danger:hover{border-color:var(--red);color:var(--red)}

.page-header{background:linear-gradient(155deg,#7B1F2E,#5a1522);
  color:#fff;padding:2rem 1rem;text-align:center;width:100%}
.page-header h1{font-family:'Playfair Display',serif;
  font-size:clamp(1.3rem,5vw,2rem);margin-bottom:.3rem}
.page-header p{color:rgba(255,255,255,.55);font-size:.8rem}

.main{padding:1.2rem 1rem;max-width:800px;margin:0 auto;width:100%}

.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem;margin-bottom:1.5rem}
.sum-card{background:var(--card);border-radius:var(--r);padding:.9rem .6rem;
  text-align:center;box-shadow:var(--shadow)}
.sum-num{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--bordo);line-height:1}
.sum-lbl{font-size:.65rem;color:var(--muted);margin-top:.2rem;line-height:1.3}

.toolbar{display:flex;gap:.6rem;margin-bottom:1.2rem;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:160px}
.search-wrap i{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:.78rem}
.search-inp{width:100%;padding:.56rem .75rem .56rem 2.1rem;border:1.5px solid var(--border);
  border-radius:50px;font-size:.82rem;background:var(--card);color:var(--ink);
  font-family:'Inter',sans-serif}
.search-inp:focus{outline:none;border-color:var(--bordo)}
.filter-row{display:flex;gap:.35rem;flex-wrap:wrap}
.f-btn{padding:.33rem .75rem;border-radius:50px;border:1.5px solid var(--border);
  background:transparent;font-size:.72rem;cursor:pointer;color:var(--muted);transition:all .2s}
.f-btn:hover,.f-btn.active{border-color:var(--bordo);color:var(--bordo);background:rgba(123,31,46,.05)}
.f-btn.low.active{border-color:var(--green);color:var(--green);background:rgba(46,125,82,.06)}
.f-btn.mid.active{border-color:var(--orange);color:var(--orange);background:rgba(230,126,34,.06)}
.f-btn.high.active{border-color:var(--red);color:var(--red);background:rgba(192,57,43,.06)}

/* RESULT CARD */
.rc{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  margin-bottom:.9rem;overflow:hidden;border-left:4px solid transparent;width:100%}
.rc.low{border-color:var(--green)}.rc.mid{border-color:var(--orange)}.rc.high{border-color:var(--red)}

.rc-top{padding:.9rem 1rem;display:flex;justify-content:space-between;
  align-items:flex-start;cursor:pointer;gap:.6rem;flex-wrap:wrap}
.rc-left{display:flex;align-items:center;gap:.7rem;min-width:0}
.rc-av{width:40px;height:40px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:#fff}
.av-low{background:var(--green)}.av-mid{background:var(--orange)}.av-high{background:var(--red)}
.rc-name{font-weight:600;font-size:.9rem;color:var(--ink)}
.rc-meta{font-size:.7rem;color:var(--muted);margin-top:.1rem;line-height:1.4}
.rc-right{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.rc-score{font-family:'Playfair Display',serif;font-size:1.6rem;line-height:1}
.sc-low{color:var(--green)}.sc-mid{color:var(--orange)}.sc-high{color:var(--red)}
.rc-badge{padding:.2rem .7rem;border-radius:50px;font-size:.68rem;font-weight:600;white-space:nowrap}
.bd-low{background:rgba(46,125,82,.1);color:var(--green)}
.bd-mid{background:rgba(230,126,34,.1);color:var(--orange)}
.bd-high{background:rgba(192,57,43,.1);color:var(--red)}
.rc-chev{color:var(--muted);font-size:.75rem;transition:transform .25s;flex-shrink:0}

.rc-body{display:none;padding:.8rem 1rem 1rem;border-top:1px solid var(--border)}
.rc-body.open{display:block}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.8rem}
.d-item{background:var(--cream);border-radius:9px;padding:.55rem .75rem}
.d-item label{display:block;font-size:.62rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:.04em;margin-bottom:.1rem}
.d-item span{font-size:.83rem;font-weight:500;color:var(--ink)}

.sec-label{font-size:.68rem;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem;
  display:flex;align-items:center;gap:.35rem}

.dom-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem}
.dom-lbl{font-size:.72rem;color:var(--ink);width:120px;flex-shrink:0;line-height:1.3}
.dom-bg{flex:1;background:var(--border);border-radius:50px;height:6px}
.dom-bar{height:6px;border-radius:50px}
.dom-val{font-size:.68rem;font-weight:700;width:28px;text-align:right;flex-shrink:0}

.cf-row{display:flex;align-items:flex-start;gap:.45rem;font-size:.75rem;
  color:var(--red);padding:.28rem 0;border-bottom:1px solid rgba(192,57,43,.08);line-height:1.4}
.cf-row:last-child{border:none}
.cf-row i{flex-shrink:0;margin-top:.15rem}

.rec-bx{border-radius:9px;padding:.75rem .9rem;font-size:.8rem;margin:.7rem 0;line-height:1.5}
.rec-bx.low{background:rgba(46,125,82,.07);border:1px solid rgba(46,125,82,.2);color:#1a4a2e}
.rec-bx.mid{background:rgba(230,126,34,.07);border:1px solid rgba(230,126,34,.2);color:#7a4010}
.rec-bx.high{background:rgba(192,57,43,.07);border:1px solid rgba(192,57,43,.2);color:#7a1010}

.rc-actions{display:flex;gap:.4rem;margin-top:.7rem;flex-wrap:wrap}
.btn-xs{padding:.3rem .7rem;border-radius:50px;border:1.5px solid var(--border);
  background:transparent;font-size:.72rem;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:.25rem;color:var(--muted)}
.btn-xs:hover{border-color:var(--bordo);color:var(--bordo)}
.btn-xs.del:hover{border-color:var(--red);color:var(--red)}

.empty{text-align:center;padding:3.5rem 1rem;color:var(--muted)}
.empty i{font-size:2.5rem;margin-bottom:.8rem;display:block;opacity:.22}
.empty h3{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--ink);margin-bottom:.4rem}
.empty a{color:var(--bordo);text-decoration:none;font-weight:500}

footer{background:#0f0a0d;color:rgba(255,255,255,.32);
  padding:1.6rem 1rem;text-align:center;margin-top:2rem;width:100%}
.f-name{font-family:'Playfair Display',serif;font-size:.9rem;
  color:rgba(255,255,255,.65);margin-bottom:.2rem}
.f-by{font-size:.7rem;margin-top:.35rem}
.f-by a{color:var(--gold);text-decoration:none}

@media(max-width:400px){
  .sum-grid{grid-template-columns:repeat(2,1fr)}
  .detail-grid{grid-template-columns:1fr}
  .dom-lbl{width:90px;font-size:.68rem}
  .nav-right .btn-nav span{display:none}
}
@media print{
  .top-nav,.toolbar,.btn-nav,.rc-actions{display:none!important}
  .rc{box-shadow:none;border:1px solid var(--border);page-break-inside:avoid}
  .rc-body{display:block!important}
}
</style>
</head>
<body>

<nav class="top-nav">
  <a href="index.html" class="nav-brand">
    <img src="https://raw.githubusercontent.com/Samir210-az/an-merkezi/main/logo.png"
         alt="AN" onerror="this.style.display='none'">
    <span>AN Mərkəzi</span>
  </a>
  <div class="nav-right">
    <a href="index.html" class="btn-nav primary"><i class="fas fa-plus"></i><span> Yeni Test</span></a>
    <button class="btn-nav" onclick="window.print()"><i class="fas fa-print"></i><span> Çap</span></button>
    <button class="btn-nav danger" onclick="clearAll()"><i class="fas fa-trash"></i><span> Sil</span></button>
  </div>
</nav>

<div class="page-header">
  <h1><i class="fas fa-chart-bar"></i> M-CHAT-R Nəticələr Arxivi</h1>
  <p>AN Psixoloji Dəstək və Reabilitasiya Mərkəzi</p>
</div>

<div class="main">
  <div class="sum-grid" id="sumGrid"></div>
  <div class="toolbar">
    <div class="search-wrap">
      <i class="fas fa-search"></i>
      <input class="search-inp" id="sInp" placeholder="Ad, mütəxəssis..." oninput="render()">
    </div>
    <div class="filter-row">
      <button class="f-btn active" onclick="setF('all',this)">Hamısı</button>
      <button class="f-btn low"  onclick="setF('low',this)">🟢 Aşağı</button>
      <button class="f-btn mid"  onclick="setF('mid',this)">🟠 Orta</button>
      <button class="f-btn high" onclick="setF('high',this)">🔴 Yüksək</button>
    </div>
  </div>
  <div id="list"></div>
</div>

<footer>
  <div class="f-name">AN Psixoloji Dəstək və Reabilitasiya Mərkəzi</div>
  <p style="font-size:.68rem">Bakı, Nizami r., Rizvan Teymurov 59 · +994 55 415 72 15</p>
  <div class="f-by">By <a href="https://www.instagram.com/s_akhundoff" target="_blank">@s_akhundoff</a></div>
</footer>

<script>
var all=[], filt='all';

function load(){ all=JSON.parse(localStorage.getItem('anMchatResults')||'[]'); }

function setF(f,btn){
  filt=f;
  document.querySelectorAll('.f-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  render();
}

function renderSum(){
  var total=all.length;
  var low=all.filter(function(r){return r.riskLevel==='low';}).length;
  var mid=all.filter(function(r){return r.riskLevel==='mid';}).length;
  var high=all.filter(function(r){return r.riskLevel==='high';}).length;
  document.getElementById('sumGrid').innerHTML=
    '<div class="sum-card"><div class="sum-num">'+total+'</div><div class="sum-lbl">Ümumi test</div></div>'+
    '<div class="sum-card"><div class="sum-num" style="color:var(--green)">'+low+'</div><div class="sum-lbl">Aşağı risk</div></div>'+
    '<div class="sum-card"><div class="sum-num" style="color:var(--orange)">'+mid+'</div><div class="sum-lbl">Orta risk</div></div>'+
    '<div class="sum-card"><div class="sum-num" style="color:var(--red)">'+high+'</div><div class="sum-lbl">Yüksək risk</div></div>';
}

function render(){
  var q=document.getElementById('sInp').value.toLowerCase();
  var items=all.filter(function(r){
    var mf=filt==='all'||r.riskLevel===filt;
    var ms=!q||(r.child.name&&r.child.name.toLowerCase().includes(q))||
            (r.child.doctor&&r.child.doctor.toLowerCase().includes(q));
    return mf&&ms;
  });

  if(!items.length){
    document.getElementById('list').innerHTML=
      '<div class="empty"><i class="fas fa-inbox"></i>'+
      '<h3>Nəticə tapılmadı</h3>'+
      '<p><a href="index.html"><i class="fas fa-plus"></i> Yeni test keç</a></p></div>';
    return;
  }

  document.getElementById('list').innerHTML=items.map(function(r){
    var lvl=r.riskLevel, c=r.child||{}, sc=r.score;
    var init=(c.name||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    var badge=r.riskLabel||lvl;

    var domH='';
    if(r.domains){
      Object.entries(r.domains).forEach(function(e){
        var nm=e[0],d=e[1];
        var pct=Math.round(d.risk/d.total*100);
        var col=pct===0?'var(--green)':pct<=50?'var(--orange)':'var(--red)';
        domH+='<div class="dom-row">'+
          '<div class="dom-lbl">'+nm+'</div>'+
          '<div class="dom-bg"><div class="dom-bar" style="width:'+pct+'%;background:'+col+'"></div></div>'+
          '<div class="dom-val" style="color:'+col+'">'+d.risk+'/'+d.total+'</div>'+
        '</div>';
      });
    }

    var cfH='';
    if(r.critFails&&r.critFails.length>0){
      cfH='<div style="margin-bottom:.7rem">'+
        '<div class="sec-label"><i class="fas fa-star" style="color:var(--gold)"></i>Uğursuz kritik suallar</div>'+
        r.critFails.map(function(cf){
          return '<div class="cf-row"><i class="fas fa-times-circle"></i>S'+cf.id+': '+cf.text+'</div>';
        }).join('')+
      '</div>';
    }

    return '<div class="rc '+lvl+'" id="rc'+r.id+'">'+
      '<div class="rc-top" onclick="tog(\''+r.id+'\')">'+
        '<div class="rc-left">'+
          '<div class="rc-av av-'+lvl+'">'+init+'</div>'+
          '<div>'+
            '<div class="rc-name">'+(c.name||'—')+'</div>'+
            '<div class="rc-meta">'+
              (c.age?c.age+' ay':'')+(c.gender?' · '+c.gender:'')+
              (c.doctor?' · <i class="fas fa-user-md"></i> '+c.doctor:'')+
              ' · <i class="fas fa-calendar"></i> '+(r.date||'')+
            '</div>'+
          '</div>'+
        '</div>'+
        '<div class="rc-right">'+
          '<div class="rc-score sc-'+lvl+'">'+sc+'<small style="font-size:.85rem;color:var(--muted)">/20</small></div>'+
          '<div class="rc-badge bd-'+lvl+'">'+badge+'</div>'+
          '<i class="fas fa-chevron-down rc-chev" id="chev'+r.id+'"></i>'+
        '</div>'+
      '</div>'+
      '<div class="rc-body" id="body'+r.id+'">'+
        '<div class="detail-grid">'+
          '<div class="d-item"><label>Uşağın adı</label><span>'+(c.name||'—')+'</span></div>'+
          '<div class="d-item"><label>Yaşı</label><span>'+(c.age?c.age+' ay':'—')+'</span></div>'+
          '<div class="d-item"><label>Cins</label><span>'+(c.gender||'—')+'</span></div>'+
          '<div class="d-item"><label>Mütəxəssis</label><span>'+(c.doctor||'—')+'</span></div>'+
          '<div class="d-item"><label>Risk balı</label>'+
            '<span style="font-weight:700;color:var(--'+(lvl==='low'?'green':lvl==='mid'?'orange':'red')+')">'+
            sc+'/20 — '+badge+'</span></div>'+
          '<div class="d-item"><label>Kritik uğursuzluq</label>'+
            '<span>'+(r.critFails?r.critFails.length:0)+' sual</span></div>'+
        '</div>'+
        cfH+
        (domH?'<div class="sec-label"><i class="fas fa-chart-bar"></i>Sahə analizi</div>'+domH:'') +
        '<div class="rec-bx '+lvl+'"><strong>Tövsiyə:</strong> '+(r.rec||'—')+'</div>'+
        '<div class="rc-actions">'+
          '<button class="btn-xs" onclick="event.stopPropagation();delRec(\''+r.id+'\')">'+
            '<i class="fas fa-trash"></i> Sil</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function tog(id){
  var b=document.getElementById('body'+id);
  var c=document.getElementById('chev'+id);
  var open=b.classList.toggle('open');
  c.style.transform=open?'rotate(180deg)':'';
}

function delRec(id){
  if(!confirm('Bu nəticəni silmək istəyirsiniz?'))return;
  all=all.filter(function(r){return String(r.id)!==String(id);});
  localStorage.setItem('anMchatResults',JSON.stringify(all));
  renderSum(); render();
}

function clearAll(){
  if(!confirm('Bütün nəticələri silmək istəyirsiniz? Bu əməliyyat geri qaytarıla bilməz!'))return;
  localStorage.removeItem('anMchatResults');
  all=[]; renderSum(); render();
}

load(); renderSum(); render();
</script>
</body>
</html>
